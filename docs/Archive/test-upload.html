<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; margin: 20px 0; }
        .status { margin: 20px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>AI Lead Router SaaS - File Upload Test</h1>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt">
        <button onclick="uploadFile()">Upload Test File</button>
    </div>
    
    <div id="status"></div>
    
    <h2>Backend Health Check</h2>
    <button onclick="checkHealth()">Check Backend Health</button>
    <div id="healthStatus"></div>

    <script>
        const API_BASE_URL = 'https://ai-lead-router-saas.vercel.app/api';
        
        async function checkHealth() {
            const statusDiv = document.getElementById('healthStatus');
            statusDiv.innerHTML = '<div class="loading">Checking backend health...</div>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`, {
                    method: 'GET',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                    },
                    credentials: 'include',
                });
                
                const data = await response.json();
                statusDiv.innerHTML = `<div class="success">
                    <strong>Backend Health:</strong> ${data.status}<br>
                    <strong>Services:</strong> ${JSON.stringify(data.services, null, 2)}
                </div>`;
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">Health check failed: ${error.message}</div>`;
            }
        }
        
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files[0]) {
                statusDiv.innerHTML = '<div class="error">Please select a file first</div>';
                return;
            }
            
            const file = fileInput.files[0];
            statusDiv.innerHTML = '<div class="loading">Uploading file...</div>';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_BASE_URL}/documents/upload`, {
                    method: 'POST',
                    headers: {
                        'X-Tenant-ID': 'demo',
                        'X-Requested-With': 'XMLHttpRequest',
                    },
                    body: formData,
                    credentials: 'include',
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `Upload failed: ${response.status}`);
                }
                
                const result = await response.json();
                statusDiv.innerHTML = `<div class="success">
                    <strong>Upload successful!</strong><br>
                    Document ID: ${result.documentId}<br>
                    Filename: ${result.filename}<br>
                    Status: ${result.status}
                </div>`;
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">Upload failed: ${error.message}</div>`;
                console.error('Upload error:', error);
            }
        }
        
        // Check health on page load
        window.onload = () => {
            checkHealth();
        };
    </script>
</body>
</html>
