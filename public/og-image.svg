<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- DocsFlow Open Graph Image -->
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- DocsFlow Logo -->
  <g transform="translate(100, 200)">
    <!-- Document Icon -->
    <rect x="0" y="0" width="80" height="100" rx="8" fill="white" opacity="0.9"/>
    <rect x="12" y="20" width="56" height="4" fill="#2563eb"/>
    <rect x="12" y="32" width="56" height="4" fill="#2563eb"/>
    <rect x="12" y="44" width="44" height="4" fill="#2563eb"/>
    <rect x="12" y="56" width="36" height="4" fill="#2563eb"/>
    
    <!-- Flow Arrow -->
    <path d="M100 50 L140 50 M130 40 L140 50 L130 60" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- AI Circle -->
    <circle cx="170" cy="50" r="30" fill="#10b981"/>
    <path d="M155 50l10 10L185 40" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- DocsFlow Text -->
  <text x="100" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">DocsFlow</text>
  <text x="100" y="430" font-family="Arial, sans-serif" font-size="32" fill="white" opacity="0.9">Enterprise Document Intelligence</text>
  
  <!-- Tagline -->
  <text x="100" y="500" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.8">Transform your documents into actionable insights</text>
</svg>
