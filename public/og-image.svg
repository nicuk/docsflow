<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="og-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-gradient)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Logo Icon -->
  <g transform="translate(600, 200)">
    <circle cx="0" cy="0" r="80" fill="white" opacity="0.95" />
    <rect x="-30" y="-40" width="45" height="60" rx="3" fill="#3B82F6"/>
    <rect x="-20" y="-30" width="25" height="3" fill="white"/>
    <rect x="-20" y="-20" width="20" height="3" fill="white"/>
    <rect x="-20" y="-10" width="25" height="3" fill="white"/>
    <path d="M20,-10 L35,-10 L35,-15 L45,-5 L35,5 L35,0 L20,0" fill="#8B5CF6"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white">DocsFlow</text>
  
  <!-- Tagline -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="white" opacity="0.9">Turn Documents Into Instant Answers</text>
  
  <!-- Features -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="white" opacity="0.8">AI-Powered • Enterprise Security • Save 8+ Hours/Week</text>
</svg>
